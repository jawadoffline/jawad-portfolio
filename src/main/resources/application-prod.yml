spring:
  thymeleaf:
    cache: true
  web:
    resources:
      cache:
        period: 86400
        cachecontrol:
          max-age: 86400
          cache-public: true

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,image/svg+xml
    min-response-size: 1024
