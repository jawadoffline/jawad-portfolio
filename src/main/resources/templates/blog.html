<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Jawad Ali</title>
    <meta name="description" content="Technical writing on Java, Spring Boot, performance optimization, trading systems, and software engineering.">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%23030712'/><text y='.88em' font-size='80' font-family='monospace' font-weight='bold' fill='%2310b981' x='50%25' text-anchor='middle'>J</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Consolas', 'monospace'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased">

<!-- Navbar -->
<nav class="sticky top-0 z-40 bg-gray-950/80 backdrop-blur-md border-b border-gray-800/50">
    <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
        <a href="/" class="font-mono font-bold text-emerald-400 text-lg tracking-wider hover:text-emerald-300 transition">
            JAWAD<span class="text-gray-600">.</span>ALI
        </a>
        <div class="flex items-center gap-6">
            <a href="/" class="text-sm text-gray-400 hover:text-emerald-400 transition font-mono tracking-wide">HOME</a>
            <a href="/blog" class="text-sm text-emerald-400 font-mono tracking-wide">BLOG</a>
            <a href="/resume" class="text-sm text-gray-400 hover:text-emerald-400 transition font-mono tracking-wide">RESUME</a>
        </div>
    </div>
</nav>

<main class="max-w-4xl mx-auto px-6 py-16">
    <p class="font-mono text-emerald-400/60 text-xs tracking-widest mb-4">WRITING</p>
    <h1 class="text-4xl sm:text-5xl font-black text-white mb-4">Blog</h1>
    <p class="text-gray-500 mb-12 max-w-lg">Thoughts on Java, Spring Boot, performance optimization, trading systems, and building software that matters.</p>

    <!-- No posts -->
    <div th:if="${#lists.isEmpty(posts)}" class="text-center py-20">
        <p class="text-gray-500 text-lg">No posts yet. Check back soon.</p>
    </div>

    <!-- Post list -->
    <div class="space-y-6" th:unless="${#lists.isEmpty(posts)}">
        <a th:each="post : ${posts}" th:href="@{'/blog/' + ${post.slug}}"
           class="block p-6 sm:p-8 rounded-2xl bg-gray-900/30 border border-gray-800/50 hover:border-emerald-500/20 transition-all duration-300 group">
            <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2 mb-3">
                <h2 th:text="${post.title}" class="text-xl font-bold text-white group-hover:text-emerald-400 transition"></h2>
                <span th:text="${#temporals.format(post.date, 'MMM dd, yyyy')}" class="text-xs font-mono text-gray-500 whitespace-nowrap"></span>
            </div>
            <p th:text="${post.description}" class="text-gray-400 text-sm leading-relaxed mb-4"></p>
            <div class="flex items-center gap-4">
                <div class="flex flex-wrap gap-2">
                    <span th:each="tag : ${post.tags}" th:text="${tag}"
                          class="px-2.5 py-0.5 text-xs font-mono rounded bg-gray-800 text-gray-400 border border-gray-700/50"></span>
                </div>
                <span class="text-xs text-gray-600 font-mono ml-auto" th:text="${post.readingTimeMinutes + ' min read'}"></span>
            </div>
        </a>
    </div>
</main>

<!-- Footer -->
<footer class="border-t border-gray-800/50">
    <div class="max-w-4xl mx-auto px-6 py-8 text-center">
        <p class="text-sm text-gray-600 font-mono">&copy; 2026 JAWAD ALI</p>
    </div>
</footer>

</body>
</html>
