<div class="space-y-6">

    <!-- Grade + URL -->
    <div class="flex flex-col sm:flex-row gap-6 items-start">
        <!-- Grade circle -->
        <div class="flex-shrink-0 w-24 h-24 rounded-2xl flex flex-col items-center justify-center"
             th:classappend="${result.score >= 90} ? 'bg-emerald-500/10 border border-emerald-500/30' : (${result.score >= 70} ? 'bg-yellow-500/10 border border-yellow-500/30' : 'bg-red-500/10 border border-red-500/30')">
            <span class="text-3xl font-black"
                  th:classappend="${result.score >= 90} ? 'text-emerald-400' : (${result.score >= 70} ? 'text-yellow-400' : 'text-red-400')"
                  th:text="${result.grade}"></span>
            <span class="text-xs font-mono text-gray-500" th:text="${result.score + '/100'}"></span>
        </div>
        <div class="flex-1">
            <p class="font-mono text-xs text-gray-500 mb-1">ANALYZED URL</p>
            <p class="text-white font-mono text-sm break-all" th:text="${result.url}"></p>
            <div class="flex flex-wrap items-center gap-3 mt-2">
                <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-mono"
                      th:classappend="${result.statusCode < 400} ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'"
                      th:text="${result.statusCode + ' ' + result.statusText}"></span>
                <span class="text-xs text-gray-500 font-mono" th:text="${result.serverHeader}"></span>
                <span class="text-xs text-gray-500 font-mono" th:text="${result.contentType}"></span>
            </div>
        </div>
    </div>

    <!-- Timing Waterfall -->
    <div class="p-6 rounded-2xl bg-gray-900/30 border border-gray-800/50">
        <div class="flex items-center gap-2 mb-5">
            <span class="w-2 h-2 rounded-full bg-cyan-400"></span>
            <p class="font-mono text-xs text-cyan-400 tracking-wider">TIMING WATERFALL</p>
            <span class="ml-auto text-sm font-bold text-white font-mono" th:text="${result.totalTimeMs + 'ms total'}"></span>
        </div>

        <div class="space-y-3">
            <!-- DNS -->
            <div class="flex items-center gap-3">
                <span class="w-24 text-xs text-gray-500 font-mono text-right">DNS</span>
                <div class="flex-1 h-5 bg-gray-800/30 rounded overflow-hidden">
                    <div class="h-full bg-blue-500/60 rounded flex items-center px-2"
                         th:style="'width:' + ${result.totalTimeMs > 0 ? (result.dnsLookupMs * 100 / result.totalTimeMs) : 0} + '%'">
                        <span class="text-[10px] text-white font-mono" th:text="${result.dnsLookupMs + 'ms'}" th:if="${result.dnsLookupMs > 0}"></span>
                    </div>
                </div>
            </div>
            <!-- Connect -->
            <div class="flex items-center gap-3">
                <span class="w-24 text-xs text-gray-500 font-mono text-right">Connect</span>
                <div class="flex-1 h-5 bg-gray-800/30 rounded overflow-hidden">
                    <div class="h-full bg-orange-500/60 rounded flex items-center px-2"
                         th:style="'width:' + ${result.totalTimeMs > 0 ? (result.connectMs * 100 / result.totalTimeMs) : 0} + '%'">
                        <span class="text-[10px] text-white font-mono" th:text="${result.connectMs + 'ms'}" th:if="${result.connectMs > 0}"></span>
                    </div>
                </div>
            </div>
            <!-- TLS -->
            <div class="flex items-center gap-3" th:if="${result.tlsHandshakeMs > 0}">
                <span class="w-24 text-xs text-gray-500 font-mono text-right">TLS</span>
                <div class="flex-1 h-5 bg-gray-800/30 rounded overflow-hidden">
                    <div class="h-full bg-purple-500/60 rounded flex items-center px-2"
                         th:style="'width:' + ${result.totalTimeMs > 0 ? (result.tlsHandshakeMs * 100 / result.totalTimeMs) : 0} + '%'">
                        <span class="text-[10px] text-white font-mono" th:text="${result.tlsHandshakeMs + 'ms'}"></span>
                    </div>
                </div>
            </div>
            <!-- TTFB -->
            <div class="flex items-center gap-3">
                <span class="w-24 text-xs text-gray-500 font-mono text-right">TTFB</span>
                <div class="flex-1 h-5 bg-gray-800/30 rounded overflow-hidden">
                    <div class="h-full bg-cyan-500/60 rounded flex items-center px-2"
                         th:style="'width:' + ${result.totalTimeMs > 0 ? (result.timeToFirstByteMs * 100 / result.totalTimeMs) : 0} + '%'">
                        <span class="text-[10px] text-white font-mono" th:text="${result.timeToFirstByteMs + 'ms'}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Stats -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <div class="p-3 rounded-xl bg-gray-900/30 border border-gray-800/50">
            <p class="text-[10px] text-gray-500 font-mono mb-1">RESPONSE SIZE</p>
            <p class="text-sm font-bold text-white font-mono" th:text="${result.responseSizeFormatted}"></p>
        </div>
        <div class="p-3 rounded-xl bg-gray-900/30 border border-gray-800/50">
            <p class="text-[10px] text-gray-500 font-mono mb-1">COMPRESSION</p>
            <p class="text-sm font-bold font-mono" th:classappend="${result.gzipEnabled} ? 'text-emerald-400' : 'text-red-400'"
               th:text="${result.gzipEnabled} ? 'ENABLED' : 'DISABLED'"></p>
        </div>
        <div class="p-3 rounded-xl bg-gray-900/30 border border-gray-800/50">
            <p class="text-[10px] text-gray-500 font-mono mb-1">CACHING</p>
            <p class="text-sm font-bold font-mono" th:classappend="${result.hasCacheControl} ? 'text-emerald-400' : 'text-yellow-400'"
               th:text="${result.hasCacheControl} ? 'CONFIGURED' : 'MISSING'"></p>
        </div>
        <div class="p-3 rounded-xl bg-gray-900/30 border border-gray-800/50">
            <p class="text-[10px] text-gray-500 font-mono mb-1">KEEP-ALIVE</p>
            <p class="text-sm font-bold font-mono" th:classappend="${result.keepAlive} ? 'text-emerald-400' : 'text-yellow-400'"
               th:text="${result.keepAlive} ? 'YES' : 'NO'"></p>
        </div>
    </div>

    <!-- Findings -->
    <div class="p-6 rounded-2xl bg-gray-900/30 border border-gray-800/50">
        <div class="flex items-center gap-2 mb-5">
            <span class="w-2 h-2 rounded-full bg-cyan-400"></span>
            <p class="font-mono text-xs text-cyan-400 tracking-wider">FINDINGS</p>
        </div>
        <div class="space-y-3">
            <div th:each="finding : ${result.findings}" class="flex gap-3 p-3 rounded-lg"
                 th:classappend="${finding.type == 'good'} ? 'bg-emerald-500/5' : (${finding.type == 'warning'} ? 'bg-yellow-500/5' : 'bg-red-500/5')">
                <span th:if="${finding.type == 'good'}" class="text-emerald-400 mt-0.5 flex-shrink-0">&#10003;</span>
                <span th:if="${finding.type == 'warning'}" class="text-yellow-400 mt-0.5 flex-shrink-0">&#9888;</span>
                <span th:if="${finding.type == 'bad'}" class="text-red-400 mt-0.5 flex-shrink-0">&#10007;</span>
                <div>
                    <p class="text-sm font-medium text-gray-200" th:text="${finding.title}"></p>
                    <p class="text-xs text-gray-500 mt-0.5" th:text="${finding.detail}"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Raw headers -->
    <details class="group">
        <summary class="text-xs text-gray-500 font-mono cursor-pointer hover:text-cyan-400 transition">SECURITY HEADERS CHECKLIST &darr;</summary>
        <div class="mt-3 overflow-x-auto">
            <table class="w-full text-sm">
                <tbody>
                    <tr class="border-b border-gray-800/30">
                        <td class="py-2 pr-4 font-mono text-xs text-gray-400">Strict-Transport-Security</td>
                        <td class="py-2 text-right font-mono text-xs" th:classappend="${result.hasHSTS} ? 'text-emerald-400' : 'text-red-400'" th:text="${result.hasHSTS} ? 'Present' : 'Missing'"></td>
                    </tr>
                    <tr class="border-b border-gray-800/30">
                        <td class="py-2 pr-4 font-mono text-xs text-gray-400">Content-Security-Policy</td>
                        <td class="py-2 text-right font-mono text-xs" th:classappend="${result.hasContentSecurityPolicy} ? 'text-emerald-400' : 'text-red-400'" th:text="${result.hasContentSecurityPolicy} ? 'Present' : 'Missing'"></td>
                    </tr>
                    <tr class="border-b border-gray-800/30">
                        <td class="py-2 pr-4 font-mono text-xs text-gray-400">X-Frame-Options</td>
                        <td class="py-2 text-right font-mono text-xs" th:classappend="${result.hasXFrameOptions} ? 'text-emerald-400' : 'text-red-400'" th:text="${result.hasXFrameOptions} ? 'Present' : 'Missing'"></td>
                    </tr>
                    <tr class="border-b border-gray-800/30">
                        <td class="py-2 pr-4 font-mono text-xs text-gray-400">X-Content-Type-Options</td>
                        <td class="py-2 text-right font-mono text-xs" th:classappend="${result.hasXContentTypeOptions} ? 'text-emerald-400' : 'text-red-400'" th:text="${result.hasXContentTypeOptions} ? 'Present' : 'Missing'"></td>
                    </tr>
                    <tr>
                        <td class="py-2 pr-4 font-mono text-xs text-gray-400">ETag</td>
                        <td class="py-2 text-right font-mono text-xs" th:classappend="${result.hasETag} ? 'text-emerald-400' : 'text-yellow-400'" th:text="${result.hasETag} ? 'Present' : 'Missing'"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </details>
</div>
